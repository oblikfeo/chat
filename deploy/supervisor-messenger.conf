[program:messenger-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /home/chat/messenger/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/home/chat/messenger/storage/logs/worker.log
stopwaitsecs=3600

[program:messenger-reverb]
command=php /home/chat/messenger/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/home/chat/messenger
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/home/chat/messenger/storage/logs/reverb.log
stopwaitsecs=10
